<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINGLIS | Evidence Submission</title>
    <link rel="stylesheet" href="styles.css">
    <!-- FIX: JSZip must be loaded before script.js -->
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
</head>
<body>

    <main class="viewport-container">
        <!-- Header -->
        <header class="system-header">
            <div class="logo-wrapper">
                <img src="assets/KINGLIS-LOGO.png" alt="KINGLIS Emblem" class="brand-logo">
            </div>
        </header>

        <!-- Main Interface -->
        <section class="interface-body">
            <div class="meta-label">EVIDENCE SUBMISSION</div>
            <h1 class="main-heading">Submit evidence</h1>
            <p class="supporting-text">Add the files provided for review.</p>

            <!-- Drag and Drop Zone -->
            <div id="drop-zone" class="drop-zone">
                <input type="file" id="file-input" class="hidden-input" multiple accept=".pdf,.docx,.xlsx,.csv,.msg,.txt">
                <div class="drop-zone-prompt">
                    <p class="prompt-main">Drag and drop files here <span class="dim">or</span> <button type="button" id="browse-btn" class="text-link">select files</button></p>
                    <p class="prompt-sub">PDF · DOCX · XLSX · CSV · MSG · TXT</p>
                </div>
            </div>

            <!-- Selected File Queue -->
            <div id="queue-container" class="queue-container hidden">
                <div class="queue-header">
                    <span>File Queue</span>
                    <span id="queue-count">0 files</span>
                </div>
                <div id="file-queue" class="file-queue">
                    <!-- Dynamic Rows Inserted Here -->
                </div>
            </div>

            <!-- Action Area -->
            <div class="action-container">
                <button type="button" id="submit-btn" class="primary-button" disabled>Submit files</button>
                <div id="system-feedback" class="system-feedback hidden"></div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="system-footer">
            <div class="footer-divider"></div>
            <p>KINGLIS · ORGANIZATIONAL INTELLIGENCE</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
