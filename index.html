<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINGLIS Secure Drop</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0a0a0c">
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
</head>

<body>
    <main class="viewport-container">
        <header class="system-header">
            <div class="logo-wrapper">
                <img src="assets/KINGLIS-LOGO.png" alt="KINGLIS Emblem" class="brand-logo">
            </div>
        </header>

        <section class="interface-body">
            <div class="meta-label">SECURE SUBMISSION</div>
            <h1 class="main-heading">Submit material</h1>
            <p class="supporting-text">Add the files provided for review.</p>

            <div style="margin:16px 0 20px">
              <label for="client-name" style="display:block;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#8b8d98;margin-bottom:8px">Company Name *</label>
              <input id="client-name" type="text" placeholder="e.g. KXSZ Corp" required
                style="width:100%;background:#0f0f12;border:1px solid #2a2a32;border-radius:12px;padding:14px 16px;color:#fff;font-size:15px;outline:none">
              <p id="client-error" style="color:#ff6b7a;font-size:12px;margin-top:8px;display:none">Company name is required</p>
            </div>

            <div id="drop-zone" class="drop-zone">
                <input type="file" id="file-input" class="hidden-input" multiple accept=".pdf,.docx,.xlsx,.csv,.msg,.eml,.txt,.png,.jpg,.jpeg">
                <div class="drop-zone-prompt">
                    <p class="prompt-main">Drag and drop files here <span class="dim">or</span> <button type="button" id="browse-btn" class="text-link">select files</button></p>
                    <p class="prompt-sub">PDF · DOCX · XLSX · CSV · MSG · EML · TXT · PNG · JPG</p>
                </div>
            </div>

            <div id="queue-container" class="queue-container hidden">
                <div class="queue-header"><span>File Queue</span><span id="queue-count">0 files</span></div>
                <div id="file-queue" class="file-queue"></div>
            </div>

            <div class="action-container">
                <button type="button" id="submit-btn" class="primary-button" disabled>Submit</button>
                <div id="system-feedback" class="system-feedback hidden"></div>

                <!-- 1-CLICK PWA INSTALL - no address bar hunting -->
                <button type="button" id="installBtn" style="display:none;margin-top:12px;background:#fff;border:0;color:#000;padding:12px 16px;border-radius:10px;width:100%;cursor:pointer;font-weight:600">Install KINGLIS Secure Drop</button>

                <!-- Fallback.url with your icon -->
                <button type="button" id="shortcut-btn" style="margin-top:12px;background:transparent;border:1px solid #2a2a32;color:#8b8d98;padding:10px 16px;border-radius:10px;width:100%;cursor:pointer">Add KINGLIS to Desktop</button>
            </div>
        </section>

        <footer class="system-footer">
            <div class="footer-divider"></div>
            <p>KINGLIS · ORGANIZATIONAL INTELLIGENCE · SECURE DROP</p>
        </footer>
    </main>

    <script src="script.js"></script>
    <script>
      // 1-click PWA install
      let deferredPrompt;
      const installBtn = document.getElementById('installBtn');
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'block';
      });
      installBtn?.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
        installBtn.style.display = 'none';
      });

      // Desktop.url shortcut download
      document.getElementById('shortcut-btn')?.addEventListener('click', () => {
        const content = `[InternetShortcut]\r\nURL=https://secure.thisiskinglis.com\r\nIconFile=https://secure.thisiskinglis.com/assets/kinglis.ico\r\nIconIndex=0\r\n`;
        const blob = new Blob([content], {type: 'application/octet-stream'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'KINGLIS Secure Drop.url';
        a.click();
        URL.revokeObjectURL(a.href);
      });
    </script>
</body>
</html>
